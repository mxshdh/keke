<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>估值看板</title>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #f5f7fb; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .fund-name { font-size: 1.1rem; font-weight: bold; }
        .fund-code { font-size: 0.8rem; color: #666; }
        .price { font-size: 1.2rem; font-weight: bold; color: #1e293b; }
        .est { font-size: 1rem; color: #64748b; }
        .rate { font-size: 1rem; font-weight: bold; }
        .rate.positive { color: #ef4444; }
        .rate.negative { color: #10b981; }
        button, select { padding: 8px 12px; border-radius: 6px; font-size: 0.9rem; }
        button { background: #3b82f6; color: white; border: none; cursor: pointer; margin-bottom: 15px; }
        button:active { background: #2563eb; }
        select { border: 1px solid #cbd5e1; margin-left: 8px; }
        .toolbar { margin-bottom: 15px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
    </style>
</head>
<body>
    <h1>📊 估值看板</h1>
    <div class="toolbar">
        <button onclick="refreshPrices()">🔄 刷新实时股价</button>
        <select onchange="sortList(this.value)">
            <option value="rate_desc">溢价从高到低</option>
            <option value="rate_asc">溢价从低到高</option>
            <option value="code">按代码</option>
            <option value="name">按名称</option>
        </select>
    </div>
    <div id="fund-list"></div>
    <div id="update-time" style="font-size:0.8rem; color:#999; text-align:center; margin-top:15px;"></div>
    <script>
        const VALUATION_DATA = {"161130": {"name": "纳斯达克", "est_nav": 4.60613151700217, "nav": 4.5806, "price": 4.93}, "161127": {"name": "标普生物", "est_nav": 1.7981938807665088, "nav": 1.8377, "price": 1.833}, "161128": {"name": "标普信息", "est_nav": 6.874437763802512, "nav": 6.8753, "price": 7.445}, "161126": {"name": "标普医疗", "est_nav": 1.8288706112854964, "nav": 1.8291, "price": 1.866}, "161125": {"name": "标普500", "est_nav": 3.1395427012904538, "nav": 3.1322, "price": 3.258}, "161124": {"name": "香港小盘", "est_nav": 1.0241715418182353, "nav": 1.0243, "price": 1.017}, "162411": {"name": "华宝油气", "est_nav": 0.8868181516418828, "nav": 0.8674, "price": 0.865}, "162415": {"name": "美国消费", "est_nav": 2.915807585405862, "nav": 2.979, "price": 3.033}, "162719": {"name": "石油LOF", "est_nav": 2.684086132183173, "nav": 2.628, "price": 2.628}, "160416": {"name": "石油基金", "est_nav": 2.0842767971594993, "nav": 2.0516, "price": 2.051}, "164824": {"name": "印度基金", "est_nav": 1.2872297686204672, "nav": 1.2957, "price": 1.273}, "501225": {"name": "全球芯片", "est_nav": 3.260875330763013, "nav": 3.2359, "price": 4.55}, "160140": {"name": "美国精选", "est_nav": 1.3787803720668377, "nav": 1.4003, "price": 1.417}, "160644": {"name": "港美互联", "est_nav": 2.1390726106283418, "nav": 2.0603, "price": 2.336}, "160719": {"name": "嘉实黄金", "est_nav": 2.0298396979151754, "nav": 2.046, "price": 2.007}, "160723": {"name": "嘉实原油", "est_nav": 2.0495863065082274, "nav": 2.0238, "price": 2.164}, "161116": {"name": "黄金主题", "est_nav": 1.6737281025101192, "nav": 1.6934, "price": 1.671}, "161129": {"name": "原油易达", "est_nav": 1.720434111940681, "nav": 1.6905, "price": 1.813}, "163208": {"name": "全球油气", "est_nav": 1.3067566748025414, "nav": 1.278, "price": 1.279}, "164701": {"name": "黄金LOF", "est_nav": 1.7615715807043961, "nav": 1.789, "price": 1.758}, "165513": {"name": "中信保诚", "est_nav": 1.064385087286761, "nav": 1.0785, "price": 1.061}, "501018": {"name": "南方原油", "est_nav": 1.8016840656863815, "nav": 1.7711, "price": 1.965}, "501312": {"name": "海外科技", "est_nav": 2.409572395336976, "nav": 2.3991, "price": 2.508}, "164906": {"name": "中概互联", "est_nav": 0.9729197384873309, "nav": 0.9587, "price": 0.969}};
        const FUND_CODES = Object.keys(VALUATION_DATA);
        
        function getRate(price, est) {
            if (price && est && est > 0 && price !== '—') return (price / est - 1) * 100;
            return null;
        }
        
        function renderPrices(prices) {
            const list = document.getElementById('fund-list');
            list.innerHTML = '';
            for (const code of FUND_CODES) {
                const data = VALUATION_DATA[code] || {};
                let price;
                if (prices[code] && prices[code] > 0.001 && prices[code] < 10000) {
                    price = prices[code].toFixed(3);
                } else if (data.price && data.price > 0) {
                    price = data.price.toFixed(3);
                } else {
                    price = '—';
                }
                const est = data.est_nav ? data.est_nav.toFixed(3) : '—';
                const rate = getRate(parseFloat(price), parseFloat(est));
                const rateStr = rate !== null ? (rate >= 0 ? '+' : '') + rate.toFixed(2) + '%' : '—';
                const rateClass = rate >= 0 ? 'positive' : 'negative';
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.code = code;
                card.dataset.name = data.name || '';
                card.dataset.price = parseFloat(price) || 0;
                card.dataset.est = parseFloat(est) || 0;
                card.dataset.rate = rate !== null ? rate : -9999;
                card.innerHTML = `<div class="header"><span class="fund-name">${data.name || code}</span><span class="fund-code">${code}</span></div><div style="display:flex; justify-content: space-between; align-items: center;"><div><div class="price">${price}</div><div class="est">估值 ${est}</div></div><div class="rate ${rateClass}">${rateStr}</div></div>`;
                list.appendChild(card);
            }
            document.getElementById('update-time').innerText = '股价刷新于：' + new Date().toLocaleTimeString();
            sortList(document.querySelector('select').value);
        }
        
        function sortList(mode) {
            const list = document.getElementById('fund-list');
            const cards = Array.from(list.children);
            cards.sort((a, b) => {
                if (mode === 'rate_desc') return parseFloat(b.dataset.rate) - parseFloat(a.dataset.rate);
                if (mode === 'rate_asc') return parseFloat(a.dataset.rate) - parseFloat(b.dataset.rate);
                if (mode === 'name') return a.dataset.name.localeCompare(b.dataset.name, 'zh');
                return a.dataset.code.localeCompare(b.dataset.code);
            });
            cards.forEach(c => list.appendChild(c));
        }
        
        function refreshPrices() {
            const codes = FUND_CODES.map(c => (c.startsWith('5')||c.startsWith('6')||c.startsWith('9')?'sh':'sz') + c).join(',');
            const script = document.createElement('script');
            script.src = `https://web.sqt.gtimg.cn/q=${codes}`;
            script.onload = function() {
                const prices = {};
                for (const code of FUND_CODES) {
                    const prefix = (code.startsWith('5')||code.startsWith('6')||code.startsWith('9')?'sh':'sz');
                    const varName = `v_${prefix}${code}`;
                    const raw = window[varName];
                    if (raw && typeof raw === 'string') {
                        const parts = raw.split('~');
                        let price = parseFloat(parts[3]);
                        if (isNaN(price) || price <= 0) price = parseFloat(parts[12]);
                        if (!isNaN(price) && price > 0.001 && price < 10000) prices[code] = price;
                    }
                }
                renderPrices(prices);
                document.head.removeChild(script);
            };
            script.onerror = function() { alert('刷新失败，请稍后重试。'); };
            document.head.appendChild(script);
            renderPrices({});
        }
        renderPrices({});
    </script>
</body>
</html>
