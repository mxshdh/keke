<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>估值看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f7fb;padding:6px;color:#1e293b;font-size:12px;}
.container{max-width:100%;margin:0 auto;}
.navbar{display:flex;gap:10px;margin-bottom:12px;background:#fff;padding:6px 12px;border-radius:8px;}
.navbar a{text-decoration:none;color:#3b82f6;font-size:12px;}
h1{font-size:14px;margin:6px 0 8px;}
.toolbar{display:flex;gap:6px;margin-bottom:8px;}
button{background:#3b82f6;color:#fff;border:none;padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;table-layout:fixed;}
th{background:#f8fafc;padding:6px 2px;text-align:left;font-size:10px;border-bottom:2px solid #e2e8f0;cursor:pointer;}
td{padding:5px 2px;border-bottom:1px solid #f1f5f9;font-size:11px;}
.code{font-weight:600;color:#3b82f6;}
.rate-badge{display:inline-block;padding:2px 6px;border-radius:10px;font-weight:700;font-size:10px;min-width:50px;text-align:center;}
.rate-badge.positive{color:#ef4444;background:#fef2f2;}
.rate-badge.negative{color:#10b981;background:#f0fdf4;}
.update-time{font-size:9px;color:#94a3b8;text-align:center;margin-top:8px;}
.kweb-impact,.hssi-impact{font-size:9px;font-weight:600;}
</style>
</head>
<body>
<div class="container">
<div class="navbar"><a href="./">QDII估值</a><a href="./domestic.html">国内LOF</a></div>
<h1>📊 估值看板</h1>
<div class="toolbar"><button onclick="refreshPrices()">🔄 刷新</button></div>
<table><thead><tr><th onclick="sortBy('code')">代码</th><th onclick="sortBy('name')">名称</th><th onclick="sortBy('price')">股价</th><th onclick="sortBy('est_nav')">估值</th><th onclick="sortBy('rate')">溢价</th></tr></thead><tbody id="tableBody"><tr><td colspan="5">加载中...</td></tr></tbody></table>
<div class="update-time" id="updateTime"></div>
</div>
<script>
const VALUATION_DATA = {"161130": {"name": "纳斯达克", "est_nav": 4.607364810881786, "nav": 4.4804, "price": 4.755}, "161127": {"name": "标普生物", "est_nav": 1.8265451634924044, "nav": 1.7946, "price": 1.795}, "161128": {"name": "标普信息", "est_nav": 6.549243903706853, "nav": 6.5539, "price": 7.066}, "161126": {"name": "标普医疗", "est_nav": 1.8814623997771196, "nav": 1.8828, "price": 1.882}, "161125": {"name": "标普500", "est_nav": 3.117123182143465, "nav": 3.0712, "price": 3.173}, "161124": {"name": "香港小盘", "est_nav": 0.9865, "nav": 0.9865, "price": 0.979}, "162411": {"name": "华宝油气", "est_nav": 0.8380788567985719, "nav": 0.8737, "price": 0.844}, "162415": {"name": "美国消费", "est_nav": 2.922127114352767, "nav": 2.878, "price": 2.891}, "162719": {"name": "石油LOF", "est_nav": 2.5658641765923926, "nav": 2.6628, "price": 2.576}, "160416": {"name": "石油基金", "est_nav": 2.01343596480671, "nav": 2.0813, "price": 2.013}, "164824": {"name": "印度基金", "est_nav": 1.3001516124779453, "nav": 1.2856, "price": 1.295}, "501225": {"name": "全球芯片", "est_nav": 3.460488052958414, "nav": 3.3205, "price": 4.644}, "160140": {"name": "美国精选", "est_nav": 1.440634771434059, "nav": 1.4451, "price": 1.447}, "160644": {"name": "港美互联", "est_nav": 2.156528812715213, "nav": 2.0598, "price": 2.231}, "160719": {"name": "嘉实黄金", "est_nav": 1.9180254125323077, "nav": 1.892, "price": 1.919}, "160723": {"name": "嘉实原油", "est_nav": 1.9444383230609095, "nav": 1.9668, "price": 2.069}, "161116": {"name": "黄金主题", "est_nav": 1.6036609260700614, "nav": 1.5714, "price": 1.601}, "161129": {"name": "原油易达", "est_nav": 1.6198298799132358, "nav": 1.6404, "price": 1.739}, "163208": {"name": "全球油气", "est_nav": 1.2411088962262824, "nav": 1.288, "price": 1.25}, "164701": {"name": "黄金LOF", "est_nav": 1.694984534789246, "nav": 1.65, "price": 1.681}, "165513": {"name": "中信保诚", "est_nav": 1.023588628751907, "nav": 1.0003, "price": 1.014}, "501018": {"name": "南方原油", "est_nav": 1.6994080371589269, "nav": 1.7232, "price": 1.885}, "501312": {"name": "海外科技", "est_nav": 2.421277148319296, "nav": 2.3205, "price": 2.376}, "164906": {"name": "中概互联", "est_nav": 0.9545776152681961, "nav": 0.9553, "price": 0.948}};
const FUND_CODES = Object.keys(VALUATION_DATA);
let sortCol = "rate", sortAsc = false;
let currentPrices = {};
function buildList(){
    let list=[];
    for(const code of FUND_CODES){
        const data=VALUATION_DATA[code]||{};
        let price=currentPrices[code]||data.price||null;
        const est=data.est_nav||null;
        const rate=(price&&est)?((price/est-1)*100):null;
        list.push({code,name:data.name||code,price,est_nav:est,rate});
    }
    return list;
}
function sortBy(col){
    if(sortCol===col)sortAsc=!sortAsc;
    else{sortCol=col;sortAsc=(col==="rate");}
    renderTable();
}
function renderTable(){
    const list=buildList();
    list.sort((a,b)=>{
        let va=a[sortCol]!==null?a[sortCol]:(sortAsc?9999:-9999);
        let vb=b[sortCol]!==null?b[sortCol]:(sortAsc?9999:-9999);
        if(sortCol==="code"||sortCol==="name") return sortAsc?vb.localeCompare(va):va.localeCompare(vb);
        return sortAsc?va-vb:vb-va;
    });
    let html="";
    for(const f of list){
        const priceStr=f.price?f.price.toFixed(3):"—";
        const estStr=f.est_nav?f.est_nav.toFixed(3):"—";
        const rateStr=f.rate!==null?(f.rate>=0?"+":"")+f.rate.toFixed(2)+"%":"—";
        const rateClass=f.rate!==null?(f.rate>=0?"positive":"negative"):"";
        html+=`<tr><td class="code">${f.code}</td><td>${f.name}</td><td>${priceStr}</td><td>${estStr}</td><td><span class="rate-badge ${rateClass}">${rateStr}</span></td></tr>`;
    }
    document.getElementById("tableBody").innerHTML=html||'<tr><td colspan="5">无数据</td></tr>';
}
function refreshPrices(){
    const codes=FUND_CODES.map(c=>(c.startsWith('5')||c.startsWith('6')||c.startsWith('9')?'sh':'sz')+c).join(',');
    const script=document.createElement('script');
    script.src=`https://web.sqt.gtimg.cn/q=${codes}`;
    script.onload=function(){
        for(const code of FUND_CODES){
            const prefix=(code.startsWith('5')||code.startsWith('6')||code.startsWith('9')?'sh':'sz');
            const raw=window[`v_${prefix}${code}`];
            if(raw&&typeof raw==='string'){
                const parts=raw.split('~');
                let price=parseFloat(parts[3]);
                if(isNaN(price)||price<=0)price=parseFloat(parts[12]);
                if(!isNaN(price)&&price>0)currentPrices[code]=price;
            }
        }
        renderTable();
        document.getElementById("updateTime").innerText="刷新于："+new Date().toLocaleTimeString();
        document.head.removeChild(script);
    };
    script.onerror=function(){alert('刷新失败');};
    document.head.appendChild(script);
}
renderTable();
</script>
</body>
</html>
